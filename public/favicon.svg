<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Richard A. Wilson">
  <!-- Blue squircle background (matches site accent #1d6fc0) -->
  <rect width="64" height="64" rx="14" ry="14" fill="#1d6fc0"/>
  <!-- White uppercase R, geometric, balanced for tab favicons -->
  <text
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="44"
    fill="#ffffff"
    letter-spacing="-1"
  >R</text>
</svg>
