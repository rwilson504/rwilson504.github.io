<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d6fc0"/>
      <stop offset="60%" stop-color="#175698"/>
      <stop offset="100%" stop-color="#0f3d6e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#5fa8e6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5fa8e6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- R monogram tile in the corner, echoing the favicon -->
  <g transform="translate(72,72)">
    <rect width="96" height="96" rx="22" fill="#ffffff"/>
    <text
      x="48" y="48"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="'Liberation Sans', 'Helvetica Neue', Arial, sans-serif"
      font-weight="800"
      font-size="68"
      fill="#1d6fc0"
      letter-spacing="-2">R</text>
  </g>

  <!-- Eyebrow -->
  <text
    x="72" y="290"
    font-family="'Liberation Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="#bcdcf5">POWERAPPS RAW! &#8212; SINCE 2009</text>

  <!-- Headline -->
  <text
    x="72" y="380"
    font-family="'Liberation Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="80"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-2">Richard A. Wilson</text>

  <!-- Subhead -->
  <text
    x="72" y="450"
    font-family="'Liberation Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#e6f1fb">Power Platform &#183; AI &#183; side projects</text>

  <!-- URL footer -->
  <text
    x="72" y="558"
    font-family="'Liberation Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="24"
    font-weight="500"
    fill="#bcdcf5">www.richardawilson.com</text>
</svg>
